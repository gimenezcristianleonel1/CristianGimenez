# ============================================================
#  Render Blueprint - Backend (NestJS)
#  Base de datos: PostgreSQL en Supabase (plan free, permanente).
#  Despliegue: Render -> New + -> Blueprint -> conectá este repo.
#  (También podés hacerlo manual: ver DEPLOY-RENDER.md)
#
#  DATABASE_URL se setea a mano en el panel de Render con la cadena de
#  conexión "Session pooler" de Supabase (puerto 5432). Ver DEPLOY-SUPABASE.md.
# ============================================================
services:
  - type: web
    name: livestock-api
    runtime: node
    plan: free
    # Health check para que Render sepa que la API está viva (ruta pública).
    healthCheckPath: /api/v1/health
    # --include=dev asegura que se instalen las devDeps (nest CLI, typescript)
    # aunque NODE_ENV=production. Luego genera el cliente Prisma y compila.
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    # Aplica migraciones pendientes (crea las tablas en Supabase) y arranca.
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      # Cadena "Session pooler" de Supabase (puerto 5432). Se setea a mano en
      # el panel de Render -> Environment (no se versiona: es un secreto).
      - key: DATABASE_URL
        sync: false
      # Render genera un secreto aleatorio seguro la primera vez.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      # Se setean a mano en el panel (ver DEPLOY-RENDER.md):
      #   CORS_ORIGIN     -> URL de tu sitio en Netlify
      #   GOOGLE_CLIENT_ID-> sólo si usás login con Google (opcional)
      - key: CORS_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
